name: Deploy to AWS

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.AWS_PROJECT_NAME != '' && vars.AWS_PROJECT_NAME || 'auth-stack' }}
  ENVIRONMENT_NAME: ${{ vars.AWS_ENVIRONMENT != '' && vars.AWS_ENVIRONMENT || 'prod' }}
  FRONTEND_CONTAINER_NAME: frontend
  BACKEND_CONTAINER_NAME: backend

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS deploy role configuration
        run: |
          if [ -z "${{ vars.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "Set the AWS_DEPLOY_ROLE_ARN repository variable to the Terraform output github_actions_deploy_role_arn."
            exit 1
          fi

      - name: Set stack names
        id: names
        run: |
          set -euo pipefail
          stack_prefix="${PROJECT_NAME}-${ENVIRONMENT_NAME}"
          echo "stack_prefix=${stack_prefix}" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster=${stack_prefix}-cluster" >> "$GITHUB_OUTPUT"
          echo "frontend_service=${stack_prefix}-frontend" >> "$GITHUB_OUTPUT"
          echo "backend_service=${stack_prefix}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_repository=${stack_prefix}-frontend" >> "$GITHUB_OUTPUT"
          echo "backend_repository=${stack_prefix}-backend" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-ecs-deploy

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: backend-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.names.outputs.backend_repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${image_uri}" backend
          docker tag "${image_uri}" "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          docker push "${image_uri}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "image_uri=${image_uri}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        id: frontend-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.names.outputs.frontend_repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=/api \
            -t "${image_uri}" \
            frontend
          docker tag "${image_uri}" "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          docker push "${image_uri}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "image_uri=${image_uri}" >> "$GITHUB_OUTPUT"

      - name: Register backend task definition revision
        id: backend-taskdef
        env:
          ECS_CLUSTER: ${{ steps.names.outputs.ecs_cluster }}
          ECS_SERVICE: ${{ steps.names.outputs.backend_service }}
          CONTAINER_NAME: ${{ env.BACKEND_CONTAINER_NAME }}
          IMAGE_URI: ${{ steps.backend-image.outputs.image_uri }}
        run: |
          set -euo pipefail
          current_task_definition_arn=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "${current_task_definition_arn}" \
            --query 'taskDefinition' \
            > backend-task-definition.json

          jq --arg image "${IMAGE_URI}" --arg container "${CONTAINER_NAME}" '
            del(
              .compatibilities,
              .registeredAt,
              .registeredBy,
              .requiresAttributes,
              .revision,
              .status,
              .taskDefinitionArn
            )
            | .containerDefinitions |= map(
                if .name == $container then
                  .image = $image
                else
                  .
                end
              )
          ' backend-task-definition.json > backend-task-definition.rendered.json

          task_definition_arn=$(aws ecs register-task-definition \
            --cli-input-json file://backend-task-definition.rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_definition_arn=${task_definition_arn}" >> "$GITHUB_OUTPUT"

      - name: Run Prisma migrations as a one-off task
        env:
          ECS_CLUSTER: ${{ steps.names.outputs.ecs_cluster }}
          ECS_SERVICE: ${{ steps.names.outputs.backend_service }}
          CONTAINER_NAME: ${{ env.BACKEND_CONTAINER_NAME }}
          TASK_DEFINITION_ARN: ${{ steps.backend-taskdef.outputs.task_definition_arn }}
        run: |
          set -euo pipefail
          service_json=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}")

          subnets=$(echo "${service_json}" | jq '.services[0].networkConfiguration.awsvpcConfiguration.subnets')
          security_groups=$(echo "${service_json}" | jq '.services[0].networkConfiguration.awsvpcConfiguration.securityGroups')
          assign_public_ip=$(echo "${service_json}" | jq -r '.services[0].networkConfiguration.awsvpcConfiguration.assignPublicIp')

          network_configuration=$(jq -nc \
            --argjson subnets "${subnets}" \
            --argjson securityGroups "${security_groups}" \
            --arg assignPublicIp "${assign_public_ip}" \
            '{
              awsvpcConfiguration: {
                subnets: $subnets,
                securityGroups: $securityGroups,
                assignPublicIp: $assignPublicIp
              }
            }')

          overrides=$(jq -nc \
            --arg container "${CONTAINER_NAME}" \
            '{
              containerOverrides: [
                {
                  name: $container,
                  command: ["pnpm", "prisma:migrate:deploy"]
                }
              ]
            }')

          task_arn=$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --launch-type FARGATE \
            --task-definition "${TASK_DEFINITION_ARN}" \
            --network-configuration "${network_configuration}" \
            --overrides "${overrides}" \
            --query 'tasks[0].taskArn' \
            --output text)

          aws ecs wait tasks-stopped \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${task_arn}"

          exit_code=$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${task_arn}" \
            --query "tasks[0].containers[?name=='${CONTAINER_NAME}'].exitCode | [0]" \
            --output text)

          if [ "${exit_code}" != "0" ]; then
            stopped_reason=$(aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER}" \
              --tasks "${task_arn}" \
              --query 'tasks[0].stoppedReason' \
              --output text)
            echo "Migration task failed with exit code ${exit_code}: ${stopped_reason}"
            exit 1
          fi

      - name: Deploy backend service
        env:
          ECS_CLUSTER: ${{ steps.names.outputs.ecs_cluster }}
          ECS_SERVICE: ${{ steps.names.outputs.backend_service }}
          TASK_DEFINITION_ARN: ${{ steps.backend-taskdef.outputs.task_definition_arn }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${TASK_DEFINITION_ARN}" \
            --force-new-deployment > /dev/null

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

      - name: Register frontend task definition revision
        id: frontend-taskdef
        env:
          ECS_CLUSTER: ${{ steps.names.outputs.ecs_cluster }}
          ECS_SERVICE: ${{ steps.names.outputs.frontend_service }}
          CONTAINER_NAME: ${{ env.FRONTEND_CONTAINER_NAME }}
          IMAGE_URI: ${{ steps.frontend-image.outputs.image_uri }}
        run: |
          set -euo pipefail
          current_task_definition_arn=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "${current_task_definition_arn}" \
            --query 'taskDefinition' \
            > frontend-task-definition.json

          jq --arg image "${IMAGE_URI}" --arg container "${CONTAINER_NAME}" '
            del(
              .compatibilities,
              .registeredAt,
              .registeredBy,
              .requiresAttributes,
              .revision,
              .status,
              .taskDefinitionArn
            )
            | .containerDefinitions |= map(
                if .name == $container then
                  .image = $image
                else
                  .
                end
              )
          ' frontend-task-definition.json > frontend-task-definition.rendered.json

          task_definition_arn=$(aws ecs register-task-definition \
            --cli-input-json file://frontend-task-definition.rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_definition_arn=${task_definition_arn}" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend service
        env:
          ECS_CLUSTER: ${{ steps.names.outputs.ecs_cluster }}
          ECS_SERVICE: ${{ steps.names.outputs.frontend_service }}
          TASK_DEFINITION_ARN: ${{ steps.frontend-taskdef.outputs.task_definition_arn }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${TASK_DEFINITION_ARN}" \
            --force-new-deployment > /dev/null

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"
